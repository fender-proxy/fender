# GitLab CI/CD Catalog configuration for the fender component.
# See: https://docs.gitlab.com/ee/ci/components/#publish-a-component

stages:
  - validate
  - release

# ── Component self-test ────────────────────────────────────────────────────
# Validates that the component template works correctly.
# Runs on MR and pushes to the default branch.
validate-component:
  stage: validate
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache curl bash
    - |
      set -euo pipefail

      # Install the latest fender binary
      VERSION=$(curl -fsSL https://api.github.com/repos/fender-proxy/fender/releases/latest \
        | grep '"tag_name"' | cut -d'"' -f4)
      OS=linux
      ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
      curl -fsSL \
        "https://github.com/fender-proxy/fender/releases/download/${VERSION}/fender_${OS}_${ARCH}.tar.gz" \
        | tar -xz -C /usr/local/bin fender
      chmod +x /usr/local/bin/fender

      mkdir -p "$HOME/.fender"
      printf 'default_registry: "registry.fender-ci-test.invalid"\nlog_level: "debug"\n' \
        > "$HOME/.fender/config.yaml"

      nohup fender > /tmp/fender.log 2>&1 &
      for i in $(seq 1 20); do
        [ -S "$HOME/.fender/fender.sock" ] && break
        [ "$i" -eq 20 ] && { echo "fender failed to start"; cat /tmp/fender.log; exit 1; }
        sleep 0.5
      done
      export DOCKER_HOST="unix://$HOME/.fender/fender.sock"
  script:
    - docker pull hello-world 2>/dev/null || true
    - sleep 0.5
    - |
      if grep -q "registry.fender-ci-test.invalid" /tmp/fender.log; then
        echo "✓ image reference rewritten by fender"
      else
        echo "✗ rewrite not found in fender log"
        cat /tmp/fender.log
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Catalog release ────────────────────────────────────────────────────────
# Publishes a new component version to the GitLab CI/CD Catalog.
# Triggered by version tags (v*).
release-component:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - echo "Publishing fender component $CI_COMMIT_TAG to CI/CD Catalog"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "fender $CI_COMMIT_TAG"
    description: |
      Transparent Docker registry proxy — rewrites unqualified image references
      to your registry in CI without any daemon configuration.

      ## Usage

      ```yaml
      include:
        - component: gitlab.com/fender-proxy/fender/fender@$CI_COMMIT_TAG
          inputs:
            default-registry: registry.example.com

      build:
        extends: .fender
        script:
          - docker pull nginx   # → registry.example.com/library/nginx
      ```

      See the [GitHub release](https://github.com/fender-proxy/fender/releases/tag/$CI_COMMIT_TAG)
      for pre-built binaries (the component downloads these automatically).
