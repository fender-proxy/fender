# GitLab CI/CD Catalog configuration for the fender component.
# See: https://docs.gitlab.com/ee/ci/components/#publish-a-component

stages:
  - validate
  - release

include:
  - local: templates/fender/template.yml
    inputs:
      default-registry: "registry.fender-ci-test.invalid"
      log-level: "debug"

# ── Component self-test ────────────────────────────────────────────────────
# Validates that the component template works correctly.
# Runs on MR and pushes to the default branch.
validate-component:
  stage: validate
  extends: .fender
  image:
    name: docker:latest
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl bash && exec /device-entrypoint.sh || exec /bin/sh"]
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker pull hello-world 2>/dev/null || true
    - sleep 0.5
    - |
      # Check fender log to confirm the rewrite occurred
      if grep -q "registry.fender-ci-test.invalid" /tmp/fender.log; then
        echo "✓ image reference rewritten by fender"
      else
        echo "✗ rewrite not found in fender log"
        cat /tmp/fender.log
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Catalog release ────────────────────────────────────────────────────────
# Publishes a new component version to the GitLab CI/CD Catalog.
# Triggered by version tags (v*).
release-component:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - echo "Publishing fender component $CI_COMMIT_TAG to CI/CD Catalog"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "fender $CI_COMMIT_TAG"
    description: |
      Transparent Docker registry proxy — rewrites unqualified image references
      to your registry in CI without any daemon configuration.

      ## Usage

      ```yaml
      include:
        - component: gitlab.com/fender-proxy/fender/fender@$CI_COMMIT_TAG
          inputs:
            default-registry: registry.example.com

      build:
        extends: .fender
        script:
          - docker pull nginx   # → registry.example.com/library/nginx
      ```

      See the [GitHub release](https://github.com/fender-proxy/fender/releases/tag/$CI_COMMIT_TAG)
      for pre-built binaries (the component downloads these automatically).
